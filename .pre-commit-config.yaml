default_install_hook_types:
  - pre-commit
  - pre-push
  - commit-msg

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff-format
        files: ^backend/
        args: [--check]
        stages: [pre-commit]

      - id: ruff-check
        files: ^backend/
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: frontend-lint-staged
        name: frontend lint-staged
        entry: bash -lc 'cd dashboard && pnpm lint-staged'
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: frontend-typecheck
        name: frontend typecheck
        entry: bash -lc 'cd dashboard && pnpm typecheck'
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: frontend-pre-push
        name: frontend pre-push
        entry: bash
        args:
          - -lc
          - |
            REMOTE="$1"
            if [ -z "$MASTER_REF" ]; then
              MASTER_REF="$REMOTE/main"
            fi

            if ! read LOCAL_REF LOCAL_SHA REMOTE_REF REMOTE_SHA; then
              echo "NOTE: nothing to push, nothing to check"
              exit 0
            fi

            if [ "$LOCAL_REF" = "(delete)" ]; then
              echo "NOTE: deleting branch, nothing to check"
              exit 0
            fi

            exit 0
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: check-dco
        name: Check DCO Sign-off
        stages: [commit-msg]
        entry: sh
        args:
          - -c
          - |
            if ! ( git interpret-trailers --parse "$1" | grep -q "Signed-off-by:" ); then
              echo 'Missing DCO "Signed-off-by:" line. Try committing with "--signoff|-s"'
              exit 1
            fi
          - --
        language: system
        always_run: true
